name: Deploy to GitHub Pages

# Publishes BOTH versions to one Pages site:
#   main -> /        (prod)   https://brookeslist.dabrewer.dev/
#   dev  -> /dev/    (dev)    https://brookeslist.dabrewer.dev/dev/
# Lives on the dev branch only; it checks out both branches itself and builds the
# Vite app for each with the matching API base + public path. Pushing to main does
# not auto-redeploy — re-run via "Run workflow" or push to dev.

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ---------- PROD (main -> /) ----------
      - name: Checkout main (prod)
        uses: actions/checkout@v4
        with:
          ref: main
          path: prod-src
      - name: Build prod
        working-directory: prod-src/web
        env:
          BASE_PATH: /
          VITE_API_BASE: https://brookeslist-api.dabrewer.dev
        run: |
          npm install
          npm run build
      - name: Assemble prod into site root
        run: |
          mkdir -p _site
          cp -r prod-src/web/dist/. _site/
          cp _site/index.html _site/404.html

      # ---------- DEV (dev -> /dev/) ----------
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev-src
      - name: Build dev
        working-directory: dev-src/web
        env:
          BASE_PATH: /dev/
          VITE_API_BASE: https://brookeslist-api-dev.dabrewer.dev
        run: |
          npm install
          npm run build
      - name: Assemble dev into /dev
        run: |
          mkdir -p _site/dev
          cp -r dev-src/web/dist/. _site/dev/
          cp _site/dev/index.html _site/dev/404.html

      - name: Set custom domain
        run: echo "brookeslist.dabrewer.dev" > _site/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
